services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./.whisper_models:/workspace/.whisper_models
      - whisper_cache:/root/.cache/whisper  # Persist model cache
    environment:
      - VBZ_DEBUG=True
      - VBZ_HOST=0.0.0.0
      - VBZ_PORT=8000
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - app
    ports:
      - "3000:3000"
    environment:
      - VITE_API_PROXY_TARGET=http://app:8000

volumes:
  whisper_cache:  # Named volume for Whisper model cache
